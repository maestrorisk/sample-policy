name: Bundle policy

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  bundle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up OPA
        uses: open-policy-agent/setup-opa@v2
        with:
          version: 1.17.1

      # Fail fast on syntax/type errors before we spend time bundling.
      - name: Check policy
        run: opa check --strict .

      - name: Run tests
        run: opa test . -v

      # Bundle the policy only — test files are excluded so they don't ship.
      # The revision stamps the git SHA into .manifest for traceability.
      - name: Build bundle
        run: opa build -b . --ignore '*_test.rego' -r "${{ github.sha }}" -o bundle.tar.gz

      - name: Upload bundle artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: policy-bundle
          path: bundle.tar.gz
          if-no-files-found: error

  # Publish the bundle as a GitHub Release asset, but only for v* tags.
  release:
    needs: bundle
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    # Configure this environment in repo settings with required reviewers
    # to require manual approval before publishing a release.
    environment: production
    concurrency:
      group: release-${{ github.ref }}
      cancel-in-progress: false
    permissions:
      contents: write
    steps:
      - name: Check out tagged commit
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Ensure tag commit is on main
        run: |
          git fetch origin main --depth=1
          if ! git merge-base --is-ancestor "${GITHUB_SHA}" "origin/main"; then
            echo "Tag ${GITHUB_REF_NAME} does not point to a commit on main."
            exit 1
          fi

      - name: Download bundle artifact
        uses: actions/download-artifact@v8
        with:
          name: policy-bundle

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh release create "${{ github.ref_name }}"
          bundle.tar.gz
          --repo "${{ github.repository }}"
          --title "${{ github.ref_name }}"
          --generate-notes
